{% extends "base.html" %}

{% block content %}
<div class="card" style="margin-bottom: 20px;">
    <h2 style="margin-top: 0; font-family: 'Space Grotesk', sans-serif;">Lab 4 - Multi-Tenant Gateway</h2>
    <p style="color: var(--muted);">Selecciona el tenant para acceder al login de la organizacion.</p>
</div>

<div class="grid" style="margin-bottom: 20px;">
    {% for tenant in tenants %}
    <div class="card">
        <h3>{{ tenant }}</h3>
        <a class="btn" href="/lab4/login/{{ tenant }}">Entrar</a>
    </div>
    {% endfor %}
</div>

<div class="card">
    <h3>Registro</h3>
    <p style="color: var(--muted);">Registra una nueva cuenta en el tenant seleccionado.</p>
    <a class="btn secondary" href="/lab4/register">Ir a registro</a>
</div>
{% endblock %}
